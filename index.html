<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>life in weeks</title>

<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --muted: #888;
    --accent: #111;
    --lived: #111;
    --future: #e5e5e5;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    width: 100%;
  }

  h1 {
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 10px;
  }

  p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 20px;
  }

  input, button {
    width: 100%;
    padding: 12px;
    font-size: 14px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    background: none;
  }

  button {
    cursor: pointer;
    background: var(--text);
    color: white;
    border: none;
  }

  .hidden {
    display: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(52, 1fr);
    gap: 2px;
    margin: 20px 0;
  }

  .cell {
    width: 100%;
    padding-top: 100%;
  }

  .lived {
    background: var(--lived);
  }

  .future {
    background: var(--future);
  }

  .stats {
    font-size: 14px;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .grid {
      grid-template-columns: repeat(26, 1fr);
    }
  }
</style>
</head>

<body>

<div class="container">

  <!-- Step 1 -->
  <div id="step1">
    <h1>your life in weeks</h1>
    <p>enter your birth date to see your time in weeks</p>
    <input type="date" id="birthdate" />
    <button onclick="generate()">continue</button>
  </div>

  <!-- Step 2 -->
  <div id="step2" class="hidden">
    <h1>your life</h1>
    <p id="summary"></p>

    <div class="grid" id="grid"></div>

    <div class="stats" id="stats"></div>
  </div>

</div>

<script>
function generate() {
  const input = document.getElementById("birthdate").value;
  if (!input) return;

  const birthDate = new Date(input);
  const now = new Date();

  const weeksLived = Math.floor((now - birthDate) / (1000 * 60 * 60 * 24 * 7));

  const lifeExpectancyWeeks = 90 * 52; // 90 years
  const grid = document.getElementById("grid");

  grid.innerHTML = "";

  for (let i = 0; i < lifeExpectancyWeeks; i++) {
    const div = document.createElement("div");
    div.classList.add("cell");

    if (i < weeksLived) {
      div.classList.add("lived");
    } else {
      div.classList.add("future");
    }

    grid.appendChild(div);
  }

  // summary
  document.getElementById("summary").innerText =
    `you have lived ${weeksLived.toLocaleString()} weeks so far`;

  // stats
  const years = Math.floor(weeksLived / 52);
  const remainingWeeks = lifeExpectancyWeeks - weeksLived;

  document.getElementById("stats").innerHTML = `
    you are about ${years} years old<br/>
    you may have around ${remainingWeeks.toLocaleString()} weeks left<br/>
    each square represents one week<br/><br/>
    time is finite. use it well.
  `;

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}
</script>

</body>
</html>
